<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Chat UI</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <!--
      This wrapper keeps the layout centered on the page and gives the chat area
      a clear visual boundary.
    -->
    <main class="page-shell">
      <!--
        This section is the main chat card. It contains a header, a scrollable
        message list, and the input form.
      -->
      <section class="chat-card" aria-label="Chat interface">
        <header class="chat-header">
          <h1>Chat Assistant</h1>
          <p>Simple TypeScript chat interface</p>
        </header>

        <!--
          The messages container is updated by TypeScript. New message bubbles are
          appended here as the user sends text and receives responses.
        -->
        <div id="messages" class="messages" aria-live="polite" aria-label="Chat messages"></div>

        <!--
          The form uses standard HTML semantics. Pressing Enter in the text field
          or clicking the button submits the message.
        -->
        <form id="chat-form" class="chat-form" autocomplete="off">
          <label for="chat-input" class="sr-only">Type your message</label>
          <input
            id="chat-input"
            name="message"
            type="text"
            placeholder="Type a message..."
            required
            maxlength="500"
          />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <!--
      We load the compiled JavaScript output from TypeScript.
      The script is a module so we can use modern JS features safely.
    -->
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
